<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock, Paper, Scissors</h1>

    <div class="scoreboard">
      <div class="score-card">
        <h2>Player</h2>
        <p id="user-score">0</p>
      </div>
      <div class="score-card">
        <h2>Computer</h2>
        <p id="comp-score">0</p>
      </div>
    </div>

    <div class="choices">
      <button onclick="playGame('rock')" title="Rock">✊</button>
      <button onclick="playGame('paper')" title="Paper">✋</button>
      <button onclick="playGame('scissors')" title="Scissors">✌️</button>
    </div>

    <div class="result" id="result-message">Choose your weapon!</div>
  </body>
</html>
